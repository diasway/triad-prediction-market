[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true
fs_permissions = [{ access = "read-write", path = "./" }]

[fuzz]
runs = 512
max_test_rejects = 100000

[invariant]
runs = 128
depth = 32
fail_on_revert = false

[fmt]
line_length = 100
bracket_spacing = true
int_types = "long"
multiline_func_header = "attributes_first"
