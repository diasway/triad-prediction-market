specVersion: 1.0.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MarketFactory
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: MarketFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Market
        - Trade
        - LiquidityPosition
        - VaultDeposit
        - ProposalSnapshot
      abis:
        - name: MarketFactory
          file: ../out/MarketFactory.sol/MarketFactory.json
        - name: OutcomeAMM
          file: ../out/OutcomeAMM.sol/OutcomeAMM.json
        - name: PredictionMarket
          file: ../out/PredictionMarket.sol/PredictionMarket.json
      eventHandlers:
        - event: MarketCreated(indexed uint256,address,address,uint256,uint256)
          handler: handleMarketCreated
      file: ./src/mapping.ts
